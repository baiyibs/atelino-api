basePath: /
definitions:
  atelino_internal_dto.CreateHitokotoRequest:
    properties:
      content:
        type: string
    required:
    - content
    type: object
  atelino_internal_dto.HitokotoResponse:
    properties:
      content:
        type: string
      created_at:
        type: string
      id:
        type: integer
    type: object
  atelino_internal_dto.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  atelino_internal_dto.RegisterRequest:
    properties:
      code:
        type: string
      email:
        type: string
      password:
        minLength: 8
        type: string
      username:
        maxLength: 20
        type: string
    required:
    - code
    - email
    - password
    - username
    type: object
  atelino_internal_dto.Response:
    properties:
      code:
        type: integer
      data: {}
      message:
        type: string
    type: object
  atelino_internal_dto.TokenResponse:
    properties:
      access_token:
        type: string
      refresh_token:
        type: string
    type: object
  atelino_internal_dto.UserResponse:
    properties:
      created_at:
        type: string
      email:
        type: string
      id:
        type: integer
      role:
        type: string
      username:
        type: string
    type: object
externalDocs:
  description: OpenAPI
  url: https://swagger.io/resources/open-api/
host: localhost:8080
info:
  contact: {}
  description: Atelino 后端 API 文档
  title: Atelino API
  version: 1.0.7
paths:
  /api/hitokoto:
    get:
      consumes:
      - application/json
      description: 从数据库中随机获取一条一言记录。
      produces:
      - application/json
      responses:
        "200":
          description: 请求成功
          schema:
            allOf:
            - $ref: '#/definitions/atelino_internal_dto.Response'
            - properties:
                data:
                  $ref: '#/definitions/atelino_internal_dto.HitokotoResponse'
              type: object
        "404":
          description: 没有找到对应的一言
          schema:
            $ref: '#/definitions/atelino_internal_dto.Response'
        "500":
          description: 数据库错误
          schema:
            $ref: '#/definitions/atelino_internal_dto.Response'
      summary: 随机获取一言
      tags:
      - 一言
    post:
      consumes:
      - application/json
      description: 创建一条新的一言记录。
      parameters:
      - description: 一言内容
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/atelino_internal_dto.CreateHitokotoRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 添加成功
          schema:
            allOf:
            - $ref: '#/definitions/atelino_internal_dto.Response'
            - properties:
                data:
                  $ref: '#/definitions/atelino_internal_dto.HitokotoResponse'
              type: object
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/atelino_internal_dto.Response'
        "409":
          description: 该一言已存在
          schema:
            $ref: '#/definitions/atelino_internal_dto.Response'
        "500":
          description: 数据库错误
          schema:
            $ref: '#/definitions/atelino_internal_dto.Response'
      security:
      - BearerAuth: []
      summary: 添加一言
      tags:
      - 一言
  /api/hitokoto/{id}:
    delete:
      consumes:
      - application/json
      description: 传入一言的 ID，从数据库中删除对应的记录。
      parameters:
      - description: 一言 ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 删除成功
          schema:
            $ref: '#/definitions/atelino_internal_dto.Response'
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/atelino_internal_dto.Response'
        "401":
          description: 未授权
          schema:
            $ref: '#/definitions/atelino_internal_dto.Response'
        "404":
          description: 没有找到对应的一言
          schema:
            $ref: '#/definitions/atelino_internal_dto.Response'
        "500":
          description: 数据库错误
          schema:
            $ref: '#/definitions/atelino_internal_dto.Response'
      security:
      - BearerAuth: []
      summary: 删除一言
      tags:
      - 一言
    get:
      consumes:
      - application/json
      description: 传入一言的 ID，从数据库中查询对应的记录。
      parameters:
      - description: 一言 ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 请求成功
          schema:
            allOf:
            - $ref: '#/definitions/atelino_internal_dto.Response'
            - properties:
                data:
                  $ref: '#/definitions/atelino_internal_dto.HitokotoResponse'
              type: object
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/atelino_internal_dto.Response'
        "401":
          description: 未授权
          schema:
            $ref: '#/definitions/atelino_internal_dto.Response'
        "404":
          description: 没有找到对应的一言
          schema:
            $ref: '#/definitions/atelino_internal_dto.Response'
        "500":
          description: 数据库错误
          schema:
            $ref: '#/definitions/atelino_internal_dto.Response'
      security:
      - BearerAuth: []
      summary: 获取一言
      tags:
      - 一言
  /api/hitokoto/list:
    get:
      consumes:
      - application/json
      description: 从数据库中查询所有的一言记录。
      parameters:
      - description: 页数
        in: query
        name: page
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 请求成功
          schema:
            allOf:
            - $ref: '#/definitions/atelino_internal_dto.Response'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/atelino_internal_dto.HitokotoResponse'
                  type: array
              type: object
        "401":
          description: 未授权
          schema:
            $ref: '#/definitions/atelino_internal_dto.Response'
        "500":
          description: 数据库错误
          schema:
            $ref: '#/definitions/atelino_internal_dto.Response'
      security:
      - BearerAuth: []
      summary: 获取一言列表
      tags:
      - 一言
  /api/user/{id}:
    get:
      consumes:
      - application/json
      description: 传入用户的 ID，从数据库中查询指定的用户。
      parameters:
      - description: 用户 ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 请求成功
          schema:
            allOf:
            - $ref: '#/definitions/atelino_internal_dto.Response'
            - properties:
                data:
                  $ref: '#/definitions/atelino_internal_dto.UserResponse'
              type: object
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/atelino_internal_dto.Response'
        "401":
          description: 未授权
          schema:
            $ref: '#/definitions/atelino_internal_dto.Response'
        "500":
          description: 查询失败
          schema:
            $ref: '#/definitions/atelino_internal_dto.Response'
      summary: 获取用户
      tags:
      - 用户
  /auth/login:
    post:
      consumes:
      - application/json
      description: 用户登录接口
      parameters:
      - description: 登录请求体
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/atelino_internal_dto.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 登录成功
          schema:
            allOf:
            - $ref: '#/definitions/atelino_internal_dto.Response'
            - properties:
                data:
                  $ref: '#/definitions/atelino_internal_dto.TokenResponse'
              type: object
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/atelino_internal_dto.Response'
        "401":
          description: 用户名或密码错误
          schema:
            $ref: '#/definitions/atelino_internal_dto.Response'
        "500":
          description: 登录失败
          schema:
            $ref: '#/definitions/atelino_internal_dto.Response'
      summary: 用户登录
      tags:
      - 用户
  /auth/register:
    post:
      consumes:
      - application/json
      description: 用户注册接口
      parameters:
      - description: 注册请求体
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/atelino_internal_dto.RegisterRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 注册成功
          schema:
            $ref: '#/definitions/atelino_internal_dto.Response'
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/atelino_internal_dto.Response'
        "409":
          description: 该邮箱已注册
          schema:
            $ref: '#/definitions/atelino_internal_dto.Response'
        "500":
          description: 注册失败
          schema:
            $ref: '#/definitions/atelino_internal_dto.Response'
      summary: 用户注册
      tags:
      - 用户
schemes:
- http
- https
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
