basePath: /
definitions:
  atelino_internal_dto.CreateHitokotoRequest:
    properties:
      content:
        description: 一言内容
        example: 千里之行，始于足下。
        type: string
    required:
    - content
    type: object
  atelino_internal_dto.HitokotoResponse:
    properties:
      content:
        description: 一言内容
        example: 千里之行，始于足下。
        type: string
      created_at:
        description: 创建时间
        example: "2024-01-01T00:00:00Z"
        type: string
      id:
        description: 一言 ID
        example: 1
        type: integer
    type: object
  atelino_internal_dto.LoginRequest:
    properties:
      email:
        description: 邮箱地址
        example: user@example.com
        format: email
        type: string
      password:
        description: 密码
        example: password123
        type: string
    required:
    - email
    - password
    type: object
  atelino_internal_dto.RefreshTokenRequest:
    properties:
      refresh_token:
        description: 刷新令牌
        example: eyJhbGciOiJIUzI1NiIs...
        type: string
    required:
    - refresh_token
    type: object
  atelino_internal_dto.RegisterRequest:
    properties:
      code:
        description: 邮箱验证码
        example: "123456"
        type: string
      email:
        description: 邮箱地址
        example: user@example.com
        format: email
        type: string
      password:
        description: 密码，最少 8 位
        example: password123
        minLength: 8
        type: string
      username:
        description: 用户名，长度 2-20
        example: John
        maxLength: 20
        minLength: 2
        type: string
    required:
    - code
    - email
    - password
    - username
    type: object
  atelino_internal_dto.Response:
    properties:
      code:
        description: 状态码，200 表示成功
        example: 200
        type: integer
      data:
        description: 响应数据
      message:
        description: 响应消息
        type: string
    type: object
  atelino_internal_dto.SendVerificationCodeRequest:
    properties:
      to:
        description: 邮箱地址
        example: user@example.com
        format: email
        type: string
    required:
    - to
    type: object
  atelino_internal_dto.TokenResponse:
    properties:
      access_token:
        description: 访问令牌
        example: eyJhbGciOiJIUzI1NiIs...
        type: string
      refresh_token:
        description: 刷新令牌
        example: eyJhbGciOiJIUzI1NiIs...
        type: string
    type: object
  atelino_internal_dto.UserResponse:
    properties:
      created_at:
        description: 创建时间
        example: "2024-01-01T00:00:00Z"
        type: string
      email:
        description: 邮箱地址
        example: user@example.com
        type: string
      id:
        description: 用户 ID
        example: 1
        type: integer
      role:
        description: 角色：user 或 admin
        enum:
        - user
        - admin
        example: user
        type: string
      username:
        description: 用户名
        example: John
        type: string
    type: object
externalDocs:
  description: OpenAPI
  url: https://swagger.io/resources/open-api/
host: localhost:8080
info:
  contact: {}
  description: Atelino 后端 API 文档
  title: Atelino API
  version: 1.1.1
paths:
  /api/hitokoto:
    get:
      consumes:
      - application/json
      description: 从数据库中随机获取一条一言记录。
      operationId: getHitokotoRandom
      produces:
      - application/json
      responses:
        "200":
          description: 请求成功
          schema:
            allOf:
            - $ref: '#/definitions/atelino_internal_dto.Response'
            - properties:
                data:
                  $ref: '#/definitions/atelino_internal_dto.HitokotoResponse'
              type: object
        "404":
          description: 没有找到对应的一言
          schema:
            $ref: '#/definitions/atelino_internal_dto.Response'
        "500":
          description: 数据库错误
          schema:
            $ref: '#/definitions/atelino_internal_dto.Response'
      summary: 随机获取一言
      tags:
      - 一言
    post:
      consumes:
      - application/json
      description: 创建一条新的一言记录。
      operationId: createHitokoto
      parameters:
      - description: 一言内容
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/atelino_internal_dto.CreateHitokotoRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 添加成功
          schema:
            allOf:
            - $ref: '#/definitions/atelino_internal_dto.Response'
            - properties:
                data:
                  $ref: '#/definitions/atelino_internal_dto.HitokotoResponse'
              type: object
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/atelino_internal_dto.Response'
        "409":
          description: 该一言已存在
          schema:
            $ref: '#/definitions/atelino_internal_dto.Response'
        "500":
          description: 数据库错误
          schema:
            $ref: '#/definitions/atelino_internal_dto.Response'
      security:
      - BearerAuth: []
      summary: 添加一言
      tags:
      - 一言
  /api/hitokoto/{id}:
    delete:
      consumes:
      - application/json
      description: 传入一言的 ID，从数据库中删除对应的记录。
      operationId: deleteHitokotoByID
      parameters:
      - description: 一言 ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 删除成功
          schema:
            $ref: '#/definitions/atelino_internal_dto.Response'
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/atelino_internal_dto.Response'
        "401":
          description: 未授权
          schema:
            $ref: '#/definitions/atelino_internal_dto.Response'
        "404":
          description: 没有找到对应的一言
          schema:
            $ref: '#/definitions/atelino_internal_dto.Response'
        "500":
          description: 数据库错误
          schema:
            $ref: '#/definitions/atelino_internal_dto.Response'
      security:
      - BearerAuth: []
      summary: 删除一言
      tags:
      - 一言
    get:
      consumes:
      - application/json
      description: 传入一言的 ID，从数据库中查询对应的记录。
      operationId: getHitokotoByID
      parameters:
      - description: 一言 ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 请求成功
          schema:
            allOf:
            - $ref: '#/definitions/atelino_internal_dto.Response'
            - properties:
                data:
                  $ref: '#/definitions/atelino_internal_dto.HitokotoResponse'
              type: object
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/atelino_internal_dto.Response'
        "401":
          description: 未授权
          schema:
            $ref: '#/definitions/atelino_internal_dto.Response'
        "404":
          description: 没有找到对应的一言
          schema:
            $ref: '#/definitions/atelino_internal_dto.Response'
        "500":
          description: 数据库错误
          schema:
            $ref: '#/definitions/atelino_internal_dto.Response'
      security:
      - BearerAuth: []
      summary: 获取一言
      tags:
      - 一言
  /api/hitokoto/list:
    get:
      consumes:
      - application/json
      description: 从数据库中查询所有的一言记录。
      operationId: getHitokotoList
      parameters:
      - description: 页数
        in: query
        name: page
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 请求成功
          schema:
            allOf:
            - $ref: '#/definitions/atelino_internal_dto.Response'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/atelino_internal_dto.HitokotoResponse'
                  type: array
              type: object
        "401":
          description: 未授权
          schema:
            $ref: '#/definitions/atelino_internal_dto.Response'
        "500":
          description: 数据库错误
          schema:
            $ref: '#/definitions/atelino_internal_dto.Response'
      security:
      - BearerAuth: []
      summary: 获取一言列表
      tags:
      - 一言
  /api/user/{id}:
    get:
      consumes:
      - application/json
      description: 传入用户的 ID，从数据库中查询指定的用户。
      operationId: getUserByID
      parameters:
      - description: 用户 ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 请求成功
          schema:
            allOf:
            - $ref: '#/definitions/atelino_internal_dto.Response'
            - properties:
                data:
                  $ref: '#/definitions/atelino_internal_dto.UserResponse'
              type: object
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/atelino_internal_dto.Response'
        "401":
          description: 未授权
          schema:
            $ref: '#/definitions/atelino_internal_dto.Response'
        "500":
          description: 查询失败
          schema:
            $ref: '#/definitions/atelino_internal_dto.Response'
      summary: 获取用户
      tags:
      - 用户
  /api/user/list:
    get:
      consumes:
      - application/json
      description: 分页获取所有用户的列表。
      operationId: getUserList
      parameters:
      - description: 页数，默认为1
        in: query
        name: page
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 请求成功
          schema:
            allOf:
            - $ref: '#/definitions/atelino_internal_dto.Response'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/atelino_internal_dto.UserResponse'
                  type: array
              type: object
        "500":
          description: 数据库错误
          schema:
            $ref: '#/definitions/atelino_internal_dto.Response'
      summary: 获取用户列表
      tags:
      - 用户
  /auth/login:
    post:
      consumes:
      - application/json
      description: 用户登录接口
      operationId: login
      parameters:
      - description: 登录请求体
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/atelino_internal_dto.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 登录成功
          schema:
            allOf:
            - $ref: '#/definitions/atelino_internal_dto.Response'
            - properties:
                data:
                  $ref: '#/definitions/atelino_internal_dto.TokenResponse'
              type: object
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/atelino_internal_dto.Response'
        "401":
          description: 用户名或密码错误
          schema:
            $ref: '#/definitions/atelino_internal_dto.Response'
        "500":
          description: 登录失败
          schema:
            $ref: '#/definitions/atelino_internal_dto.Response'
      summary: 用户登录
      tags:
      - 用户
  /auth/logout:
    post:
      consumes:
      - application/json
      description: 用户登出接口，清除用户的会话信息。
      operationId: logout
      produces:
      - application/json
      responses:
        "200":
          description: 登出成功
          schema:
            $ref: '#/definitions/atelino_internal_dto.Response'
        "401":
          description: 未登录或登录状态无效
          schema:
            $ref: '#/definitions/atelino_internal_dto.Response'
        "500":
          description: 登出失败
          schema:
            $ref: '#/definitions/atelino_internal_dto.Response'
      security:
      - BearerAuth: []
      summary: 用户登出
      tags:
      - 用户
  /auth/refresh:
    post:
      consumes:
      - application/json
      description: 使用刷新令牌获取新的访问令牌。
      operationId: refreshToken
      parameters:
      - description: 刷新令牌请求体
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/atelino_internal_dto.RefreshTokenRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 刷新成功
          schema:
            allOf:
            - $ref: '#/definitions/atelino_internal_dto.Response'
            - properties:
                data:
                  $ref: '#/definitions/atelino_internal_dto.TokenResponse'
              type: object
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/atelino_internal_dto.Response'
        "401":
          description: 令牌无效或已过期
          schema:
            $ref: '#/definitions/atelino_internal_dto.Response'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/atelino_internal_dto.Response'
      summary: 刷新令牌
      tags:
      - 用户
  /auth/register:
    post:
      consumes:
      - application/json
      description: 用户注册接口
      operationId: register
      parameters:
      - description: 注册请求体
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/atelino_internal_dto.RegisterRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 注册成功
          schema:
            $ref: '#/definitions/atelino_internal_dto.Response'
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/atelino_internal_dto.Response'
        "409":
          description: 该邮箱已注册
          schema:
            $ref: '#/definitions/atelino_internal_dto.Response'
        "500":
          description: 注册失败
          schema:
            $ref: '#/definitions/atelino_internal_dto.Response'
      summary: 用户注册
      tags:
      - 用户
  /verify/send:
    post:
      consumes:
      - application/json
      description: 向指定的邮箱发送验证码用于注册或其他用途。
      operationId: sendVerificationCode
      parameters:
      - description: 邮箱地址
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/atelino_internal_dto.SendVerificationCodeRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 发送成功
          schema:
            $ref: '#/definitions/atelino_internal_dto.Response'
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/atelino_internal_dto.Response'
        "429":
          description: 请求过于频繁，请稍后再试
          schema:
            $ref: '#/definitions/atelino_internal_dto.Response'
        "500":
          description: 发送验证码失败
          schema:
            $ref: '#/definitions/atelino_internal_dto.Response'
      summary: 发送验证码
      tags:
      - 验证
schemes:
- http
- https
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
